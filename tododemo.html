<!DOCTYPE html>
<html>
<head>
    <style>
        
        .taskdone span {
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    
    <h3>To do list</h3>
    <div>
        <input type="text" id="inpfield" placeholder="Add a task">
        <button onclick="addTask()">Add</button>
    </div>

    <div id="task_body">
        <p id="noTask">Empty</p>
    </div>
    <script>
        function addTask(){
            const taskBody = document.getElementById("task_body");

            const inpfld = document.getElementById("inpfield");
            const inptxt = inpfld.value.trim();
            
            // preventing empty task
            if (inptxt === "") {
                alert("Write something!");
                return;
            }
            // Show No task available.
            const noTaskMsg = document.getElementById("noTask");
            if(noTaskMsg){
                noTaskMsg.remove();
            }
            
            const taskDiv = document.createElement("div");
            taskDiv.className = "taskDiv";
            
            const checkBox = document.createElement("input");
            checkBox.type = "checkbox";
            // strikethrough function
            checkBox.onchange = function (){
                if(checkBox.checked){
                    taskDiv.classList.add("taskdone");
                }
                else{
                    taskDiv.classList.remove("taskdone");
                }

            };
            const textSpan = document.createElement("span");
            textSpan.textContent = inptxt;

            // delete a task with button
            const dltbtn = document.createElement("button");
            dltbtn.textContent = "delete";
            dltbtn.onclick = function(){
                taskDiv.remove();
            }

            taskDiv.appendChild(checkBox);
            taskDiv.appendChild(textSpan);
            taskDiv.appendChild(dltbtn);
            
            taskBody.appendChild(taskDiv);

            inpfld.value = "";
        }
        

    </script>






</body>   
</html>
