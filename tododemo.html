<!DOCTYPE html>
<html>

<head>
     <style>
        .taskdone span {
            text-decoration: line-through;
        }
    </style>
</head>

<body>
    
    <h3>To do list</h3>
    
    <div>
        <input type="text" id="inpfield" placeholder="Add a task">
        <button onclick="addTask()">Add</button>
    </div>

    <div>
        Total: <span id="totalTask">0</span>
        Done: <span id="doneTask">0</span>
        Remaining: <span id="remTask">0</span>
    </div>

    <div id="task_body">
        <p id="noTask">Empty</p>
    </div>
    <script>
        function taskCounter(){
            const totaltsk = document.getElementsByClassName("taskDiv").length; // get all taskdiv which is essentially the task, meaning including ckbox, text, buttons.
            let remaingtsk = 0;
            const allCkbox = document.querySelectorAll('.taskDiv input[type = "checkbox"]'); // selecting only checkbox items, regardless on or off.
            console.log(taskCounter);
            let compCkbox = 0;
            for(i=0;i<allCkbox.length;i++){
                if(allCkbox[i].checked){
                    compCkbox++;
                }
            }

            remaingtsk = totaltsk - compCkbox;

            document.getElementById("totalTask").textContent = totaltsk;
            document.getElementById("doneTask").textContent = compCkbox;
            document.getElementById("remTask").textContent = remaingtsk;
        }

        function addTask(){
            const taskBody = document.getElementById("task_body");

            const inpfld = document.getElementById("inpfield");
            const inptxt = inpfld.value.trim();
            
            // preventing empty task
            if (inptxt === "") {
                alert("Write something!");
                return;
            }
            // Show No task available.
            const noTaskMsg = document.getElementById("noTask");
            if(noTaskMsg){
                noTaskMsg.remove();
            }
            
            const taskDiv = document.createElement("div");
            taskDiv.className = "taskDiv";
            
            const checkBox = document.createElement("input");
            checkBox.type = "checkbox";
            // strikethrough function
            checkBox.onchange = function (){
                if(checkBox.checked){
                    textSpan.style.textDecoration = "line-through";
                    //taskDiv.classList.add("taskdone");
                }
                else{
                    textSpan.style.textDecoration = "none";
                    //taskDiv.classList.remove("taskdone");
                }
                taskCounter(); // fires counter after checkbox action
            };
            const textSpan = document.createElement("span");
            textSpan.textContent = inptxt;

            // delete a task with button
            const dltbtn = document.createElement("button");
            dltbtn.textContent = "delete";
            dltbtn.onclick = function(){
                taskDiv.remove();
                
                taskCounter();
            };

            taskDiv.appendChild(checkBox);
            taskDiv.appendChild(textSpan);
            taskDiv.appendChild(dltbtn);
            
            taskBody.appendChild(taskDiv);
            
            inpfld.value = "";

            taskCounter(); // update counter
        }
        

    </script>






</body>   
</html>
